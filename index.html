<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hour电竞</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{colors:{dark:'#0D0D0F',military:'#1A1C22',accent:'#38BDF8',neutral:'#9CA3AF'}}}}
</script>
</head>
<body class="bg-dark text-gray-200 min-h-screen">

<header class="sticky top-0 z-50 bg-dark/80 backdrop-blur-md border-b border-white/10">
  <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-xl font-semibold text-white">Hour <span class="text-accent">电竞</span></h1>
    <div class="flex gap-3">
      <button onclick="show('fixed')" class="px-5 py-1.5 rounded-full bg-accent text-black text-sm font-medium">固定套餐</button>
      <button onclick="show('free')" class="px-5 py-1.5 rounded-full bg-white/10 text-white text-sm font-medium hover:bg-white/20">自由下单</button>
      <button onclick="showAdmin()" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-sm"><i class="fa fa-list-ul"></i></button>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-12">
  <section id="fixed" class="page block">
    <h2 class="text-[clamp(1.5rem,3vw,2.25rem)] font-semibold text-center mb-10">护航套餐</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-military rounded-2xl p-6 flex flex-col items-center">
        <div class="text-lg mb-1">套餐一</div>
        <div class="text-accent text-xl font-semibold mb-5">88 保 688w</div>
        <button onclick="selectPkg('88保688w','88元')" class="w-full py-2 rounded-xl bg-accent text-black font-medium">选择</button>
      </div>
      <div class="bg-military rounded-2xl p-6 flex flex-col items-center">
        <div class="text-lg mb-1">套餐二</div>
        <div class="text-accent text-xl font-semibold mb-5">128 保 888w</div>
        <button onclick="selectPkg('128保888w','128元')" class="w-full py-2 rounded-xl bg-accent text-black font-medium">选择</button>
      </div>
      <div class="bg-military rounded-2xl p-6 flex flex-col items-center">
        <div class="text-lg mb-1">套餐三</div>
        <div class="text-accent text-xl font-semibold mb-5">168 保 1288w</div>
        <button onclick="selectPkg('168保1288w','168元')" class="w-full py-2 rounded-xl bg-accent text-black font-medium">选择</button>
      </div>
    </div>
  </section>

  <section id="free" class="page hidden">
    <div class="max-w-md mx-auto bg-military rounded-2xl p-6">
      <h3 class="text-lg font-medium text-center mb-6">下单信息</h3>
      <form id="form" class="space-y-4">
        <input type="text" id="gameId" placeholder="游戏ID" class="w-full px-4 py-2.5 rounded-xl bg-dark border border-white/10 outline-none focus:border-accent/50">
        <input type="text" id="service" placeholder="服务项目" class="w-full px-4 py-2.5 rounded-xl bg-dark border border-white/10 outline-none focus:border-accent/50">
        <input type="text" id="price" placeholder="价格" class="w-full px-4 py-2.5 rounded-xl bg-dark border border-white/10 outline-none focus:border-accent/50">
        <input type="text" id="server" placeholder="区服" class="w-full px-4 py-2.5 rounded-xl bg-dark border border-white/10 outline-none focus:border-accent/50">
        <textarea id="note" rows="3" placeholder="备注说明" class="w-full px-4 py-2.5 rounded-xl bg-dark border border-white/10 outline-none focus:border-accent/50"></textarea>
        <button type="submit" class="w-full py-2.5 rounded-xl bg-accent text-black font-medium">提交订单</button>
      </form>
    </div>
  </section>
</main>

<div id="admin" class="fixed inset-0 bg-black/95 z-50 hidden items-center justify-center p-4">
  <div class="bg-military w-full max-w-md rounded-2xl p-6">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-medium">订单记录</h3>
      <button onclick="closeAdmin()" class="text-red-400 text-xl">×</button>
    </div>
    <input type="password" id="pwd" placeholder="管理密码" class="w-full px-4 py-2.5 rounded-xl bg-dark border border-white/10 mb-4">
    <button onclick="check()" class="w-full py-2.5 rounded-xl bg-accent text-black font-medium mb-4">查看</button>
    <div id="orderList" class="max-h-[50vh] overflow-y-auto space-y-2 text-sm"></div>
  </div>
</div>

<footer class="text-center text-neutral text-xs py-6">
  <p>Hour 电竞 · 专业护航</p>
</footer>

<script>
const PWD = "hyh031122";
function show(id){document.querySelectorAll('.page').forEach(el=>el.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function selectPkg(svc,p){show('free');document.getElementById('service').value=svc;document.getElementById('price').value=p;}
function getOrders(){return JSON.parse(localStorage.getItem('orders')||'[]');}
function addOrder(o){const list=getOrders();list.push(o);localStorage.setItem('orders',JSON.stringify(list));}
document.getElementById('form').addEventListener('submit',e=>{
  e.preventDefault();
  const order={
    gameId:document.getElementById('gameId').value,
    service:document.getElementById('service').value,
    price:document.getElementById('price').value,
    server:document.getElementById('server').value,
    note:document.getElementById('note').value,
    time:new Date().toLocaleString()
  };
  addOrder(order);
  const msg = `ID：${order.gameId}\n服务：${order.service}\n价格：${order.price}\n区服：${order.server}\n备注：${order.note}`;
  window.open(`mqqwpa://im/chat?uin=3031505749&content=${encodeURIComponent(msg)}`);
  alert("下单成功");
  e.target.reset();
});
function showAdmin(){document.getElementById('admin').style.display='flex';}
function closeAdmin(){document.getElementById('admin').style.display='none';}
function check(){
  if(document.getElementById('pwd').value!==PWD){alert('密码错误');return;}
  const list=getOrders();let html='';
  list.forEach((o,i)=>{
    html+=`
    <div class="bg-dark p-3 rounded-xl">
      <div class="text-accent font-medium">订单 ${i+1}</div>
      <div>ID：${o.gameId}</div>
      <div>服务：${o.service}</div>
      <div>价格：${o.price}</div>
      <div>区服：${o.server}</div>
      <div class="text-neutral text-xs">${o.time}</div>
    </div>`;
  });
  document.getElementById('orderList').innerHTML=html;
}
</script>
</body>
</html>
